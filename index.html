<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Horizon Resort & Spa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">GRAND HORIZON</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#rooms">Our Rooms</a></li>
            <li><a href="#booking">Reservations</a></li>
            <li><a href="#amenities">Amenities</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Escape to Paradise</h1>
            <p>Luxury awaits you in the heart of the coast.</p>
            <a href="#booking" class="hero-btn">Book Your Stay</a>
        </div>
    </header>

    <section id="booking" class="booking-section">
        <form class="booking-bar">
            <div class="input-box">
                <label>Check-In</label>
                <input type="date" required>
            </div>
            <div class="input-box">
                <label>Check-Out</label>
                <input type="date" required>
            </div>
            <div class="input-box">
                <label>Guests</label>
                <select>
                    <option>1 Guest</option>
                    <option selected>2 Guests</option>
                    <option>3+ Guests</option>
                </select>
            </div>
            <button type="submit" class="book-btn">Check Availability</button>
        </form>
    </section>

    <section id="rooms" class="rooms-container">
        <h2 class="section-title">Our Signature Suites</h2>
        <div class="room-grid">
            <div class="room-card">
                <div class="room-img" style="background-image: url('https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&w=500&q=80');"></div>
                <h3>Ocean View Suite</h3>
                <p>Starting at $299/night</p>
            </div>
            <div class="room-card">
                <div class="room-img" style="background-image: url('https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=500&q=80');"></div>
                <h3>Garden Villa</h3>
                <p>Starting at $199/night</p>
            </div>
            <div class="room-card">
                <div class="room-img" style="background-image: url('https://images.unsplash.com/photo-1582719478250-c89cae4df85b?auto=format&fit=crop&w=500&q=80');"></div>
                <h3>Presidential Penthouse</h3>
                <p>Starting at $599/night</p>
            </div>
        </div>
    </section>

</body>
</html>
