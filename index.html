<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Su's Grand Resort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ANSU'S RESORT</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#rooms">Rooms</a></li>
            <li class="dropdown">
                <a href="#booking">Book Now ▼</a>
                <ul class="dropdown-menu">
                    <li><a href="#">Single Room</a></li>
                    <li><a href="#">Double Room</a></li>
                    <li><a href="#">Penthouse</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Welcome to Ansu's Paradise</h1>
            <p>Luxury and comfort tailored for you.</p>
        </div>
    </header>

    <section id="booking" class="booking-section">
        <div class="booking-box">
            <h2>Reserve Your Stay</h2>
            <form>
                <div class="input-group">
                    <label>Guest Name</label>
                    <input type="text" placeholder="Your Name">
                </div>
                <div class="input-group">
                    <label>Requested Room</label>
                    <select>
                        <option>Standard Suite</option>
                        <option>Deluxe View</option>
                        <option>Presidential</option>
                    </select>
                </div>
                <button type="button" class="btn">Check Availability</button>
            </form>
        </div>
    </section>

</body>
</html>
